version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workpermit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workpermit"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Frontend (nginx + built React) ──────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

  # ── FastAPI Backend ──────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/workpermit
      DOCS_ENABLED: "true"
      DOCS_USERNAME: "admin"
      DOCS_PASSWORD: "admin123"
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy   # ← waits for DB health check ✓


volumes:
  postgres_data:
